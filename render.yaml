services:
  - type: web
    name: esg-backend-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py seed_data
    startCommand: gunicorn esg_platform.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: esg-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173" # Update with production Vercel frontend URL after deployment
      - key: SECURE_SSL_REDIRECT
        value: "true"

databases:
  - name: esg-db
    databaseName: esg_compliance
    user: auditor
    plan: free
